{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Spoof Detection</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 30px;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #555;
        }

        .btn {
            display: block;
            width: 80%;
            max-width: 250px;
            margin: 15px auto;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background-color: #2575fc;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #1a5edb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voice Spoof Detection</h1>
        <p>Choose an option below to start detecting or analyzing voice recordings.</p>

        <a href="{% url 'realtime' %}" class="btn">Real-Time Detection</a>
        <a href="{% url 'analysis' %}" class="btn">Analysis / Upload File</a>
    </div>
</body>
</html>
