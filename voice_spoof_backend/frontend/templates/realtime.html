{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Voice Detection</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<div class="container">
    <h1>Real-Time Voice Detection</h1>
    <p>Click Record, speak, then Stop to analyze your voice.</p>

    <button id="recordBtn">Record</button>
    <button id="stopBtn" disabled>Stop</button>

    <div id="result" class="result"></div>
</div>

<script src="{% static 'realtime.js' %}"></script>

</body>
</html>
